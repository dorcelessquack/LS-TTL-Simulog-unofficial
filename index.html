    /* Option 1: Steckbrett-Ansicht mit 72% Skalierung und Net-Nummern (Keine Leitungen) */
    function exportiereSteckbrettSchaltplan() {
        let minX = Infinity, minY = Infinity;
        let maxX = -Infinity, maxY = -Infinity;

        let netCounter = 1;
        const portNets = {};
        const outputNetIds = {}; // Maps output port ID → net ID

        // Assign a net ID to every port that traces back to an output.
        // Uses findeAusgangQuelle to follow input-to-input chains.
        function getOrCreateNet(outputPortId) {
            if (!outputNetIds[outputPortId]) {
                outputNetIds[outputPortId] = netCounter++;
            }
            return outputNetIds[outputPortId];
        }

        // First pass: find all output ports that participate in connections
        const allConnectedPorts = new Set();
        zustand.verbindungen.forEach(v => {
            allConnectedPorts.add(v.port1);
            allConnectedPorts.add(v.port2);
        });

        // For every connected port, resolve its ultimate output source and assign the same net ID
        allConnectedPorts.forEach(portId => {
            const ultimateOutput = findeAusgangQuelle(portId);
            if (ultimateOutput) {
                const netId = getOrCreateNet(ultimateOutput);
                portNets[portId] = netId;
            }
        });

        const moduleHeights = {};
        for (const modId in zustand.instanzen) {
            const inst = zustand.instanzen[modId];
            const def = MODUL_DEFINITIONEN[inst.typ];
            const x = parseInt(inst.el.style.left);
            const y = parseInt(inst.el.style.top);
            
            let maxPortY = 0;
            def.ports.forEach(p => { if (p.y > maxPortY) maxPortY = p.y; });
            const h = Math.max(FELD_GROESSE, maxPortY + 20);
            moduleHeights[modId] = h;

            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x + FELD_GROESSE);
            maxY = Math.max(maxY, y + h);
        }

        if (minX === Infinity) { alert('Keine Gatter platziert oder verbunden.'); return; }

        minX -= 60; minY -= 60;
        maxX += 60; maxY += 60;
        const totalWidth = maxX - minX;
        const totalHeight = maxY - minY;

        let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${totalWidth}" height="${totalHeight}" viewBox="${minX} ${minY} ${totalWidth} ${totalHeight}">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .logik-pfad { fill: none; stroke: black; stroke-width: 1.5px; }
  .logik-text { fill: black; font-family: sans-serif; font-size: 13px; font-weight: bold; }
  .segment { fill: #333; }
</style>
<rect x="${minX}" y="${minY}" width="${totalWidth}" height="${totalHeight}" fill="#f4f5f6"/>`;

        const SCALE_FACTOR = 0.72;
        for (const modId in zustand.instanzen) {
            const inst = zustand.instanzen[modId];
            const def = MODUL_DEFINITIONEN[inst.typ];
            const x = parseInt(inst.el.style.left);
            const y = parseInt(inst.el.style.top);
            const w = FELD_GROESSE;
            const h = moduleHeights[modId];
            const cx = w / 2;
            const cy = h / 2;

            svg += `<g transform="translate(${x}, ${y})">`;
            svg += `<g transform="translate(${cx}, ${cy}) scale(${SCALE_FACTOR}) translate(${-cx}, ${-cy})">`;
            svg += `<rect x="0" y="0" width="${w}" height="${h}" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>`;
            svg += `<text x="${w/2}" y="${h - 8}" text-anchor="middle" font-size="10" font-weight="bold" fill="#7f8c8d">${def.name}</text>`;

            let innerSvg = typeof def.svg === 'function' ? def.svg() : def.svg;
            svg += innerSvg;

            if (inst.typ === 'IN4') {
                for(let i=0; i<4; i++) svg += `<rect x="25" y="${23+i*45}" width="20" height="24" fill="#bdc3c7" stroke="#7f8c8d" rx="2"/>`;
            } else if (inst.typ === 'CLOCK') {
                svg += `<circle cx="27" cy="55" r="10" fill="#e74c3c"/>`;
            } else if (inst.typ === 'HEX') {
                svg += `<rect x="39" y="68" width="37" height="52" fill="#000" rx="2"/><text x="57" y="105" fill="#e74c3c" font-size="36" font-family="monospace" text-anchor="middle">8</text>`;
            }

            def.ports.forEach(p => {
                const px = p.x;
                const py = p.y;
                const isOut = p.type === 'out';
                const portId = `${modId}_${p.id}`;
                const netId = portNets[portId];
                const isConnected = netId !== undefined;
                
                if (isConnected) {
                    svg += `<rect x="${px-3}" y="${py-6}" width="6" height="12" rx="1.5" fill="#34495e"/>`;
                    svg += `<circle cx="${px}" cy="${py}" r="1.5" fill="${isOut ? '#e74c3c' : '#3498db'}"/>`;
                }
                
                if (p.lbl) {
                    const lx = p.align === 'right' ? px + 8 : (p.align === 'left' ? px - 8 : px);
                    const ly = p.align === 'top' ? py - 8 : py + 3;
                    const anchor = p.align === 'right' ? 'start' : (p.align === 'left' ? 'end' : 'middle');
                    svg += `<text x="${lx}" y="${ly}" font-size="8" text-anchor="${anchor}">${p.lbl}</text>`;
                }
            });

            if (def.leds) {
                def.leds.forEach(l => {
                    svg += `<circle cx="${l.x}" cy="${l.y}" r="5" fill="#c0392b" stroke="#000"/>`;
                });
            }

            svg += `</g>`; // End Scaled Group

            def.ports.forEach(p => {
                const px = p.x;
                const py = p.y;
                const isOut = p.type === 'out';
                const portId = `${modId}_${p.id}`;
                const netId = portNets[portId];
                const isConnected = netId !== undefined;
                
                if (isConnected) {
                    const px_scaled = cx + (px - cx) * SCALE_FACTOR;
                    const py_scaled = cy + (py - cy) * SCALE_FACTOR;
                    const nx = isOut ? px_scaled + 8 : px_scaled - 8;
                    const color = isOut ? '#2ecc71' : '#27ae60';
                    const anchor = isOut ? 'start' : 'end';
                    svg += `<text x="${nx}" y="${py_scaled + 3}" font-size="9" font-weight="bold" fill="${color}" text-anchor="${anchor}">[${netId}]</text>`;
                }
            });

            svg += `</g>`;
        }

        svg += `</svg>`;

        zeigeSvgVorschau(svg, 'simulog-schaltplan-steckbrett.svg');
    }

    /* Option 2: Klassischer IEC-Standard Schaltplan mit Interval-Routing und Branch-Knobs */
    function exportiereIecSchaltplan() {
        const GATE_CONFIGS = {
            'AND4':  { symbol: '&amp;',   h: 30, w: 40, inputs: ['A', 'B'],     outputs: ['Q'],    negiert: false },
            'NAND4': { symbol: '&amp;',   h: 30, w: 40, inputs: ['A', 'B'],     outputs: ['Q'],    negiert: true  },
            'OR4':   { symbol: '≥1',  h: 30, w: 40, inputs: ['A', 'B'],     outputs: ['Q'],    negiert: false },
            'NOR4':  { symbol: '≥1',  h: 30, w: 40, inputs: ['A', 'B'],     outputs: ['Q'],    negiert: true  },
            'INV4':  { symbol: '1',   h: 30, w: 40, inputs: ['A'],          outputs: ['Q'],    negiert: true  },
            'XOR4':  { symbol: '=1',  h: 30, w: 40, inputs: ['A', 'B'],     outputs: ['Q'],    negiert: false },
            'MUX':   { symbol: 'MUX', h: 45, w: 40, inputs: ['A', 'B', 'S'],outputs: ['Q'],    negiert: false },
            'ADD':   { symbol: '∑',   h: 50, w: 45, inputs: ['Cin', 'A', 'B'], outputs: ['Cout', 'S'], negiert: false },
            'JK':    { symbol: 'JK',  h: 65, w: 45, inputs: ['J', 'C', 'K', 'S', 'R'], outputs: ['Q', 'nQ'], negiert: false },
            'HEX':   { symbol: 'HEX', h: 65, w: 45, inputs: ['E', 'I0', 'I1', 'I2', 'I3', 'RBI'], outputs: ['RBO'], negiert: false },
            'SR4':   { symbol: 'SR',  h: 80, w: 45, inputs: ['CLK', 'LD', 'SI', 'R', 'P0', 'P1', 'P2', 'P3'], outputs: ['Q0', 'Q1', 'Q2', 'Q3'], negiert: false }
        };

        // Helper to parse board port names to logical owner structures
        function getPortOwner(portId) {
            const parts = portId.split('_');
            const modId = parts[0];
            const name = parts.slice(1).join('_');
            const inst = zustand.instanzen[modId];
            if (!inst) return null;

            if (inst.typ === 'IN4') {
                if (name.startsWith('O')) return { type: 'input', inputId: modId, index: parseInt(name.slice(1)) };
            }
            if (inst.typ === 'OUT4') {
                if (name.startsWith('I')) return { type: 'output', outputId: modId, index: parseInt(name.slice(1)) };
            }
            if (inst.typ === 'CLOCK') {
                const el = document.getElementById(portId);
                if (el && el.dataset.type === 'out') {
                    let nameLabel = 'CLK'; // fallback for M_RIGHT / OR_OUT etc
                    if (name === 'C50_O') nameLabel = '50:1';
                    if (name === 'C60') nameLabel = '60:1';
                    if (name === 'C2') nameLabel = '2:1';
                    if (name === '0') nameLabel = '0';
                    return { type: 'input', inputId: modId, index: nameLabel, isClock: true };
                }
                return null;
            }

            const cfg = GATE_CONFIGS[inst.typ];
            if (!cfg) return null;

            let subIdx = 0;
            let localName = name;

            if (['AND4', 'NAND4', 'OR4', 'NOR4', 'INV4', 'XOR4', 'MUX'].includes(inst.typ)) {
                // MUX 'S' input (EaEb select line)
                if (name === 'S') return { type: 'gate', gateId: `${modId}_G0`, modId, subIdx: 0, localName: 'S', portType: 'in' };
                const lastChar = name[name.length - 1];
                if (['0','1','2','3'].includes(lastChar)) {
                    subIdx = parseInt(lastChar);
                    localName = name.slice(0, -1);
                }
            } else if (inst.typ === 'JK') {
                const lastChar = name[name.length - 1];
                if (['0','1'].includes(lastChar)) {
                    subIdx = parseInt(lastChar);
                    localName = name.slice(0, -1);
                }
            } else {
                subIdx = 0;
            }

            // Check GATE_CONFIGS first, then fall back to the actual module definition's port type
            let portType;
            if (cfg.outputs.includes(localName)) {
                portType = 'out';
            } else if (cfg.inputs.includes(localName)) {
                portType = 'in';
            } else {
                // Fallback: check the actual MODUL_DEFINITIONEN port for this name
                const modDef = MODUL_DEFINITIONEN[inst.typ];
                const modPort = modDef ? modDef.ports.find(p => p.id === name) : null;
                portType = (modPort && modPort.type === 'out') ? 'out' : 'in';
            }
            return { type: 'gate', gateId: `${modId}_G${subIdx}`, modId, subIdx, localName, portType };
        }

        // Gather active nodes
        const activeGatesMap = {};
        const activeInputsMap = {};
        const activeOutputsMap = {};

        zustand.verbindungen.forEach(v => {
            const o1 = getPortOwner(v.port1);
            const o2 = getPortOwner(v.port2);
            [o1, o2].forEach(o => {
                if (!o) return;
                if (o.type === 'gate') activeGatesMap[o.gateId] = { id: o.gateId, modId: o.modId, subIdx: o.subIdx };
                if (o.type === 'input') activeInputsMap[`${o.inputId}_${o.index}`] = { id: o.inputId, index: o.index, isClock: o.isClock };
                if (o.type === 'output') activeOutputsMap[`${o.outputId}_${o.index}`] = { id: o.outputId, index: o.index };
            });
        });

        const activeGates = Object.values(activeGatesMap);
        const activeInputs = Object.values(activeInputsMap);
        const activeOutputs = Object.values(activeOutputsMap);

        if (activeGates.length === 0 && activeInputs.length === 0 && activeOutputs.length === 0) {
            alert('Keine verbundenen Bauteile vorhanden.');
            return;
        }

        // Grid Compaction: Identify actually used columns and rows on the Steckbrett
        activeGates.forEach(g => {
            const inst = zustand.instanzen[g.modId];
            g.spalte = Math.round(parseInt(inst.el.style.left) / FELD_SCHRITT);
            g.zeile = Math.round(parseInt(inst.el.style.top) / FELD_SCHRITT);
        });

        const usedSpalten = Array.from(new Set(activeGates.map(g => g.spalte))).sort((a,b)=>a-b);
        const usedZeilen = Array.from(new Set(activeGates.map(g => g.zeile))).sort((a,b)=>a-b);

        const spaltenMap = {}; usedSpalten.forEach((s, idx) => { spaltenMap[s] = idx; });
        const zeilenMap = {}; usedZeilen.forEach((z, idx) => { zeilenMap[z] = idx; });

        // Placement constants
        const col_spacing = 150;
        const row_spacing = 160;

        // Place Inputs on Left (Col 0)
        activeInputs.forEach((inp, idx) => {
            inp.x = 40;
            inp.y = idx * 40 + 50;
            inp.w = 50;
            inp.h = 25;
            inp.col = 0;
            inp.row = 0;
        });

        // Place Gates (Col 1 to N)
        activeGates.forEach(g => {
            const inst = zustand.instanzen[g.modId];
            g.typ = inst.typ;
            g.col = spaltenMap[g.spalte] + 1;
            g.row = zeilenMap[g.zeile];
            g.w = GATE_CONFIGS[g.typ].w;
            g.h = GATE_CONFIGS[g.typ].h;
            g.x = g.col * col_spacing + 50;
            g.y = g.row * row_spacing + g.subIdx * (g.h + 10) + 50;
        });

        // Place Outputs on Right
        const outCol = usedSpalten.length + 1;
        activeOutputs.forEach((out, idx) => {
            out.x = outCol * col_spacing + 50;
            out.y = idx * 40 + 50;
            out.w = 50;
            out.h = 25;
            out.col = outCol;
            out.row = 0;
        });

        // Gate enumerator numbering (type-specific)
        const typeCounters = {};
        activeGates.forEach(g => {
            typeCounters[g.typ] = (typeCounters[g.typ] || 0) + 1;
            g.num = typeCounters[g.typ];
        });

        // Initial viewport sizing
        const maxX = outCol * col_spacing + 120;
        let globalMaxY = 100;
        let globalMinY = 0;
        [...activeInputs, ...activeGates, ...activeOutputs].forEach(n => {
            if (n.y + n.h > globalMaxY) globalMaxY = n.y + n.h;
            if (n.y < globalMinY) globalMinY = n.y;
        });

        // Interval-based track allocation
        const usedHorizontals = {};
        const usedVerticals = {};
        const TRACK_SPACING = 8;

        function quantize(val) {
            return Math.round(val / TRACK_SPACING) * TRACK_SPACING;
        }

        function blockRect(rectX, rectY, rectW, rectH, margin) {
            const minX = rectX - margin;
            const maxX = rectX + rectW + margin;
            const minY = rectY - margin;
            const maxY = rectY + rectH + margin;

            for (let y = quantize(minY); y <= quantize(maxY); y += TRACK_SPACING) {
                if (!usedHorizontals[y]) usedHorizontals[y] = [];
                usedHorizontals[y].push([minX, maxX]);
            }
            for (let x = quantize(minX); x <= quantize(maxX); x += TRACK_SPACING) {
                if (!usedVerticals[x]) usedVerticals[x] = [];
                usedVerticals[x].push([minY, maxY]);
            }
        }

        [...activeInputs, ...activeGates, ...activeOutputs].forEach(n => {
            blockRect(n.x, n.y, n.w, n.h, 15);
        });

        function findFreeHorizontal(y_base, x_start, x_end) {
            let y = quantize(y_base);
            let offset = 0;
            const xMin = Math.min(x_start, x_end);
            const xMax = Math.max(x_start, x_end);
            while (true) {
                let candidateY = y + offset;
                let hasOverlap = (usedHorizontals[candidateY] || []).some(interval => {
                    return !(xMax <= interval[0] || xMin >= interval[1]);
                });
                if (!hasOverlap) {
                    if (!usedHorizontals[candidateY]) usedHorizontals[candidateY] = [];
                    usedHorizontals[candidateY].push([xMin, xMax]);
                    return candidateY;
                }
                offset = offset >= 0 ? -offset - TRACK_SPACING : -offset;
            }
        }

        function findFreeVertical(x_base, y_start, y_end, min_x = -Infinity, max_x = Infinity) {
            let x = quantize(x_base);
            let offset = 0;
            const yMin = Math.min(y_start, y_end);
            const yMax = Math.max(y_start, y_end);
            while (true) {
                let candidateX = x + offset;
                let currentOffset = offset;
                offset = currentOffset >= 0 ? -currentOffset - TRACK_SPACING : -currentOffset;
                
                if (candidateX < min_x || candidateX > max_x) continue;

                let hasOverlap = (usedVerticals[candidateX] || []).some(interval => {
                    return !(yMax <= interval[0] || yMin >= interval[1]);
                });
                if (!hasOverlap) {
                    if (!usedVerticals[candidateX]) usedVerticals[candidateX] = [];
                    usedVerticals[candidateX].push([yMin, yMax]);
                    return candidateX;
                }
            }
        }

        // Resolve absolute port placement
        function getPortAbsPos(owner) {
            if (owner.type === 'input') {
                const node = activeInputs.find(n => n.id === owner.inputId && n.index === owner.index);
                return { x: node.x + node.w, y: node.y + node.h / 2, col: node.col, row: node.row, isTopOrBottom: false };
            }
            if (owner.type === 'output') {
                const node = activeOutputs.find(n => n.id === owner.outputId && n.index === owner.index);
                return { x: node.x, y: node.y + node.h / 2, col: node.col, row: node.row, isTopOrBottom: false };
            }
            if (owner.type === 'gate') {
                const node = activeGates.find(n => n.id === owner.gateId);
                if (!node) return null;
                const { x, y, w, h } = node;
                const cfg = GATE_CONFIGS[node.typ];
                
                const isTopOrBottom = (node.typ === 'JK' && (owner.localName === 'S' || owner.localName === 'R'));
                
                if (owner.portType === 'out') {
                    if (node.typ === 'MUX') {
                        return { x: x + w, y: y + 33, col: node.col, row: node.row, isTopOrBottom: false };
                    }
                    const outIdx = cfg.outputs.indexOf(owner.localName);
                    if (cfg.outputs.length === 1) {
                        return { x: x + w, y: y + h / 2, col: node.col, row: node.row, isTopOrBottom };
                    } else {
                        const step = h / (cfg.outputs.length + 1);
                        return { x: x + w, y: y + step * (outIdx + 1), col: node.col, row: node.row, isTopOrBottom };
                    }
                } else {
                    const inIdx = cfg.inputs.indexOf(owner.localName);
                    if (node.typ === 'JK') {
                        if (owner.localName === 'S') return { x: x + w / 2, y: y, col: node.col, row: node.row, isTopOrBottom };
                        if (owner.localName === 'R') return { x: x + w / 2, y: y + h, col: node.col, row: node.row, isTopOrBottom };
                        const leftInputs = ['J', 'C', 'K'];
                        const leftIdx = leftInputs.indexOf(owner.localName);
                        if (leftIdx !== -1) {
                            return { x: x, y: y + (h / 4) * (leftIdx + 1), col: node.col, row: node.row, isTopOrBottom };
                        }
                    }
                    if (cfg.inputs.length === 1) {
                        return { x: x, y: y + h / 2, col: node.col, row: node.row, isTopOrBottom };
                    } else {
                        const step = h / (cfg.inputs.length + 1);
                        return { x: x, y: y + step * (inIdx + 1), col: node.col, row: node.row, isTopOrBottom };
                    }
                }
            }
            return null;
        }

        // Group connections into nets using the globally reliable findeAusgangQuelle
        // to handle all multi-hop input-to-input chains correctly.
        function getOwnerKey(o) {
            if (!o) return "";
            if (o.type === 'input') return `IN_${o.inputId}_${o.index}`;
            if (o.type === 'output') return `OUT_${o.outputId}_${o.index}`;
            return `GATE_${o.gateId}_${o.localName}`;
        }

        const nets = {};
        zustand.verbindungen.forEach(v => {
            // Find the ultimate output driver for this wire's network
            const outId = findeAusgangQuelle(v.port1);
            if (!outId) return; // Network has no output driver yet, skip

            const driverOwner = getPortOwner(outId);
            if (!driverOwner) return;

            const driverKey = getOwnerKey(driverOwner);
            
            if (!nets[driverKey]) {
                nets[driverKey] = { driver: driverOwner, receivers: [], farbe: v.farbe, _rcvSet: new Set() };
            }

            // Both ends of the wire are part of this net. 
            // If they are not the driver, they are receivers.
            const o1 = getPortOwner(v.port1);
            const o2 = getPortOwner(v.port2);

            [o1, o2].forEach(o => {
                if (!o) return;
                const rKey = getOwnerKey(o);
                if (rKey !== driverKey && !nets[driverKey]._rcvSet.has(rKey)) {
                    nets[driverKey]._rcvSet.add(rKey);
                    nets[driverKey].receivers.push(o);
                }
            });
        });

        // Draw inputs and outputs
        let gatesSvg = '';
        
        activeInputs.forEach((inp, idx) => {
            const label = inp.isClock ? inp.index : `IN ${idx}`;
            gatesSvg += `<rect x="${inp.x}" y="${inp.y}" width="${inp.w}" height="${inp.h}" fill="white" stroke="black" stroke-width="1.5" rx="4"/>`;
            gatesSvg += `<text x="${inp.x+inp.w/2}" y="${inp.y+16}" text-anchor="middle" font-size="11" font-weight="bold">${label}</text>`;
            const pX = inp.x + inp.w;
            const pY = inp.y + inp.h/2;
            gatesSvg += `<circle cx="${pX}" cy="${pY}" r="3" fill="white" stroke="black"/>`;
        });

        activeOutputs.forEach((out, idx) => {
            gatesSvg += `<rect x="${out.x}" y="${out.y}" width="${out.w}" height="${out.h}" fill="white" stroke="black" stroke-width="1.5" rx="4"/>`;
            gatesSvg += `<text x="${out.x+out.w/2}" y="${out.y+16}" text-anchor="middle" font-size="11" font-weight="bold">OUT ${idx}</text>`;
            const pX = out.x;
            const pY = out.y + out.h/2;
            gatesSvg += `<circle cx="${pX}" cy="${pY}" r="3" fill="white" stroke="black"/>`;
        });

        // Draw gates
        activeGates.forEach(g => {
            const cfg = GATE_CONFIGS[g.typ];
            gatesSvg += `<rect x="${g.x}" y="${g.y}" width="${g.w}" height="${g.h}" fill="white" stroke="black" stroke-width="1.5"/>`;
            
            if (g.typ === 'JK') {
                const step = g.h / 4;
                const cY = g.y + step * 2;
                gatesSvg += `<polygon points="${g.x},${cY-5} ${g.x+7},${cY} ${g.x},${cY+5}" fill="none" stroke="black" stroke-width="1"/>`;
                gatesSvg += `<text x="${g.x+6}" y="${g.y + step + 3}" font-size="9" font-family="sans-serif" font-weight="bold">J</text>`;
                gatesSvg += `<text x="${g.x+6}" y="${g.y + step * 3 + 3}" font-size="9" font-family="sans-serif" font-weight="bold">K</text>`;
                gatesSvg += `<text x="${g.x+g.w-13}" y="${g.y+15}" font-size="9" font-family="sans-serif" font-weight="bold">Q</text>`;
                gatesSvg += `<text x="${g.x+g.w-13}" y="${g.y+g.h-6}" font-size="9" font-family="sans-serif" font-weight="bold">Q</text>`;
                gatesSvg += `<line x1="${g.x+g.w-13}" y1="${g.y+g.h-15}" x2="${g.x+g.w-4}" y2="${g.y+g.h-15}" stroke="black" stroke-width="1"/>`;
                gatesSvg += `<text x="${g.x+g.w/2}" y="${g.y+9}" text-anchor="middle" font-size="6">S</text>`;
                gatesSvg += `<text x="${g.x+g.w/2}" y="${g.y+g.h-2}" text-anchor="middle" font-size="6">R</text>`;
            } else if (g.typ === 'ADD') {
                gatesSvg += `<text x="${g.x+g.w/2}" y="${g.y+g.h/2+6}" text-anchor="middle" font-size="16" font-weight="bold">∑</text>`;
            } else if (g.typ === 'MUX') {
                gatesSvg += `<text x="${g.x+g.w/2}" y="${g.y+15}" text-anchor="middle" font-size="10" font-weight="bold">MUX</text>`;
                gatesSvg += `<text x="${g.x+2}" y="${g.y+13}" font-size="6">A</text>`;
                gatesSvg += `<text x="${g.x+2}" y="${g.y+25}" font-size="6">B</text>`;
                gatesSvg += `<text x="${g.x+2}" y="${g.y+36}" font-size="6">S</text>`;
                gatesSvg += `<text x="${g.x+g.w-2}" y="${g.y+36}" text-anchor="end" font-size="6">Q</text>`;
                
                // Shared S line and constants
                if (g.subIdx === 0) {
                    const busX = g.x - 6;
                    const busYStart = g.y + 33.75;
                    const busYEnd = g.y + 3 * (g.h + 10) + 33.75;
                    gatesSvg += `<line x1="${busX}" y1="${busYStart}" x2="${busX}" y2="${busYEnd}" stroke="black" stroke-width="1.5"/>`;
                    for (let i = 0; i <= 3; i++) {
                        let cy = g.y + i * (g.h + 10) + 33.75;
                        gatesSvg += `<line x1="${busX}" y1="${cy}" x2="${g.x}" y2="${cy}" stroke="black" stroke-width="1.5"/>`;
                        gatesSvg += `<circle cx="${busX}" cy="${cy}" r="1.5" fill="black"/>`;
                    }
                }
            } else if (g.typ === 'HEX') {
                gatesSvg += `<text x="${g.x+g.w/2}" y="${g.y+15}" text-anchor="middle" font-size="12" font-weight="bold">HEX</text>`;
                cfg.inputs.forEach((inpName, iIdx) => {
                    const step = g.h / (cfg.inputs.length + 1);
                    const pY = g.y + step * (iIdx + 1);
                    gatesSvg += `<text x="${g.x+3}" y="${pY+3}" font-size="6" font-family="sans-serif">${inpName}</text>`;
                });
                cfg.outputs.forEach((outName, oIdx) => {
                    const step = g.h / (cfg.outputs.length + 1);
                    const pY = g.y + step * (oIdx + 1);
                    gatesSvg += `<text x="${g.x+g.w-3}" y="${pY+3}" text-anchor="end" font-size="6" font-family="sans-serif">${outName}</text>`;
                });
            } else if (g.typ === 'SR4') {
                gatesSvg += `<text x="${g.x+g.w/2}" y="${g.y+10}" text-anchor="middle" font-size="8" font-weight="bold">SR4</text>`;
                cfg.inputs.forEach((inpName, iIdx) => {
                    const step = g.h / (cfg.inputs.length + 1);
                    const pY = g.y + step * (iIdx + 1);
                    gatesSvg += `<text x="${g.x+2}" y="${pY+2}" font-size="5" font-family="sans-serif">${inpName}</text>`;
                });
                cfg.outputs.forEach((outName, oIdx) => {
                    const step = g.h / (cfg.outputs.length + 1);
                    const pY = g.y + step * (oIdx + 1);
                    gatesSvg += `<text x="${g.x+g.w-2}" y="${pY+2}" text-anchor="end" font-size="5" font-family="sans-serif">${outName}</text>`;
                });
            } else {
                gatesSvg += `<text x="${g.x+g.w/2}" y="${g.y+g.h/2+5}" text-anchor="middle" font-size="13" font-weight="bold">${cfg.symbol}</text>`;
                if (cfg.negiert) {
                    gatesSvg += `<circle cx="${g.x+g.w+4}" cy="${g.y+g.h/2}" r="4" fill="white" stroke="black" stroke-width="1.5"/>`;
                }
            }
            
            // Draw ports and labels inside the group
            let pCnt = 0;
            const isJK = g.typ === 'JK';
            const numLeftInputs = isJK ? 3 : cfg.inputs.length;
            
            cfg.inputs.forEach(p => {
                if (isJK && (p === 'S' || p === 'R')) {
                    if (p === 'S') gatesSvg += `<circle cx="${g.x + g.w/2}" cy="${g.y}" r="2" fill="black"/>`;
                    if (p === 'R') gatesSvg += `<circle cx="${g.x + g.w/2}" cy="${g.y + g.h}" r="2" fill="black"/>`;
                    return;
                }
                pCnt++;
                let step = g.h / (numLeftInputs + 1);
                let pY = g.y + step * pCnt;
                if (numLeftInputs === 1) pY = g.y + g.h/2;
                gatesSvg += `<circle cx="${g.x}" cy="${pY}" r="2" fill="black"/>`;
            });
            
            if (cfg.negiert) {
                gatesSvg += `<circle cx="${g.x+g.w+8}" cy="${g.y+g.h/2}" r="2" fill="black"/>`;
            } else {
                let step = g.h / (cfg.outputs.length + 1);
                cfg.outputs.forEach((o, idx) => {
                    let pY = g.y + step * (idx + 1);
                    if (cfg.outputs.length === 1) pY = g.y + g.h/2;
                    if (g.typ === 'MUX') pY = g.y + 33;
                    gatesSvg += `<circle cx="${g.x+g.w}" cy="${pY}" r="2" fill="black"/>`;
                });
            }
        });

        // Draw Gate number
        activeGates.forEach(g => {
            gatesSvg += `<text x="${g.x+g.w-4}" y="${g.y+g.h-4}" text-anchor="end" font-size="12" font-weight="bold" fill="red">${g.num}</text>`;
        });

        // Draw Wires (Shortest-path Manhattan street-grid router)
        let wiresSvg = '';
        Object.values(nets).forEach(net => {
            const src = getPortAbsPos(net.driver);
            if (!src) return;

            const wireColor = net.farbe === 'var(--wire-red)' ? '#e74c3c' : (net.farbe === 'var(--wire-blue)' ? '#3498db' : net.farbe);

            const dsts = net.receivers.map(rcv => getPortAbsPos(rcv)).filter(Boolean);
            if (dsts.length === 0) return;

            const rx_base = src.col * col_spacing + 120;
            let minY = src.y, maxY = src.y;
            const routes = [];
            
            dsts.forEach(dst => {
                let route = { dst };
                if (dst.col === src.col + 1 && !dst.isTopOrBottom) {
                    route.branchY = dst.y;
                    route.type = 'direct';
                } else {
                    const hStreet1 = dst.row * row_spacing + 140; 
                    const hStreet2 = (dst.row - 1) * row_spacing + 140;
                    const hStreetBase = Math.abs(dst.y - hStreet1) < Math.abs(dst.y - hStreet2) ? hStreet1 : hStreet2;
                    
                    const hY = findFreeHorizontal(hStreetBase, rx_base, dst.x);
                    route.branchY = hY;
                    route.hY = hY;
                    
                    if (dst.isTopOrBottom) {
                        route.type = 'top_bottom';
                    } else {
                        const lx_base = dst.col * col_spacing - 30;
                        const lx = findFreeVertical(lx_base, Math.min(hY, dst.y), Math.max(hY, dst.y), -Infinity, dst.x - 15);
                        route.lx = lx;
                        route.type = 'far_normal';
                    }
                }
                minY = Math.min(minY, route.branchY);
                maxY = Math.max(maxY, route.branchY);
                routes.push(route);
            });
            
            const trunkX = findFreeVertical(rx_base, minY, maxY, src.x + 15);
            
            wiresSvg += `<path d="M ${src.x} ${src.y} L ${trunkX} ${src.y}" class="connection-wire" stroke="${wireColor}" fill="none"/>`;
            
            if (minY !== maxY) {
                wiresSvg += `<line x1="${trunkX}" y1="${minY}" x2="${trunkX}" y2="${maxY}" class="connection-wire" stroke="${wireColor}"/>`;
            }
            
            const knobs = new Set();
            if (minY < src.y && maxY > src.y) {
                wiresSvg += `<circle cx="${trunkX}" cy="${src.y}" r="2.5" fill="black"/>`;
                knobs.add(src.y);
            }
            
            routes.forEach(r => {
                const dst = r.dst;
                globalMaxY = Math.max(globalMaxY, r.branchY);
                globalMinY = Math.min(globalMinY, r.branchY);
                
                if (r.branchY !== minY && r.branchY !== maxY) {
                    if (!knobs.has(r.branchY)) {
                        wiresSvg += `<circle cx="${trunkX}" cy="${r.branchY}" r="2.5" fill="black"/>`;
                        knobs.add(r.branchY);
                    }
                }
                
                if (r.type === 'direct') {
                    wiresSvg += `<line x1="${trunkX}" y1="${r.branchY}" x2="${r.dst.x}" y2="${r.dst.y}" class="connection-wire" stroke="${wireColor}"/>`;
                } 
                else if (r.type === 'top_bottom') {
                    wiresSvg += `<path d="M ${trunkX} ${r.branchY} L ${r.dst.x} ${r.branchY} L ${r.dst.x} ${r.dst.y}" class="connection-wire" stroke="${wireColor}" fill="none"/>`;
                }
                else if (r.type === 'far_normal') {
                    wiresSvg += `<path d="M ${trunkX} ${r.branchY} L ${r.lx} ${r.branchY} L ${r.lx} ${r.dst.y} L ${r.dst.x} ${r.dst.y}" class="connection-wire" stroke="${wireColor}" fill="none"/>`;
                }
            });
        });

        const margin = 50;
        const totalWidth = maxX + margin * 2;
        const totalHeight = globalMaxY - globalMinY + margin * 2;
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${-margin} ${globalMinY - margin} ${totalWidth} ${totalHeight}" width="${totalWidth}" height="${totalHeight}" style="background:white; font-family:sans-serif;">`;
        svg += wiresSvg;
        svg += gatesSvg;
        svg += `</svg>`;
        zeigeSvgVorschau(svg, 'simulog-schaltplan-standard.svg');
    }

    /**
     * Shows an interactive SVG preview overlay with download, open-in-new-tab, and close buttons.
     */
    function zeigeSvgVorschau(svgString, dateiname) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;padding:20px;box-sizing:border-box;';

        const toolbar = document.createElement('div');
        toolbar.style.cssText = 'display:flex;gap:10px;margin-bottom:15px;flex-shrink:0;';

        const btnStyle = 'padding:10px 20px;color:white;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:14px;transition:filter 0.15s;';

        const btnDownload = document.createElement('button');
        btnDownload.textContent = '💾 Herunterladen';
        btnDownload.style.cssText = btnStyle + 'background:#2ecc71;';
        btnDownload.onmouseover = () => btnDownload.style.filter = 'brightness(0.85)';
        btnDownload.onmouseout  = () => btnDownload.style.filter = '';
        btnDownload.onclick = () => {
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = dateiname; a.click();
            URL.revokeObjectURL(url);
        };

        const btnNewTab = document.createElement('button');
        btnNewTab.textContent = '🔗 In neuem Tab öffnen';
        btnNewTab.style.cssText = btnStyle + 'background:#3498db;';
        btnNewTab.onmouseover = () => btnNewTab.style.filter = 'brightness(0.85)';
        btnNewTab.onmouseout  = () => btnNewTab.style.filter = '';
        btnNewTab.onclick = () => {
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        };

        const btnClose = document.createElement('button');
        btnClose.textContent = '✕ Schließen';
        btnClose.style.cssText = btnStyle + 'background:#e74c3c;';
        btnClose.onmouseover = () => btnClose.style.filter = 'brightness(0.85)';
        btnClose.onmouseout  = () => btnClose.style.filter = '';
        btnClose.onclick = () => overlay.remove();

        toolbar.appendChild(btnDownload);
        toolbar.appendChild(btnNewTab);
        toolbar.appendChild(btnClose);

        const container = document.createElement('div');
        container.style.cssText = 'background:white;border-radius:8px;padding:20px;max-width:95vw;max-height:calc(100vh - 100px);overflow:auto;box-shadow:0 4px 30px rgba(0,0,0,0.5);flex:1;min-height:0;';
        container.innerHTML = svgString;
        const svgEl = container.querySelector('svg');
        if (svgEl) {
            svgEl.style.maxWidth = '100%';
            svgEl.style.height = 'auto';
        }

        overlay.appendChild(toolbar);
        overlay.appendChild(container);
        document.body.appendChild(overlay);

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.remove();
        });
        const onKey = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
        document.addEventListener('keydown', onKey);
    }

    /* ================================================================
     * [20] APP-START
     * ================================================================ */

    window.schaltungLaden = schaltungLaden;
    window.zustand = zustand;
    document.addEventListener('DOMContentLoaded', initialisieren);

})();
</script>
